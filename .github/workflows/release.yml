name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  validate-release:
    name: Validate release version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: dtolnay/rust-toolchain@stable

      - name: Require tag to match workspace version
        run: scripts/validate-release-version.sh "${{ github.ref_name }}"

  build-matrix:
    name: Build ${{ matrix.target }}
    needs: validate-release
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            use_cross: true
            suffix: ""
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            use_cross: true
            suffix: ""
          - target: x86_64-apple-darwin
            runner: macos-latest
            use_cross: false
            suffix: ""
          - target: aarch64-apple-darwin
            runner: macos-latest
            use_cross: false
            suffix: ""
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            use_cross: false
            suffix: ".exe"
          - target: aarch64-pc-windows-msvc
            runner: windows-latest
            use_cross: false
            suffix: ".exe"
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build
        shell: bash
        run: |
          ${{ matrix.use_cross && 'cross' || 'cargo' }} build --release \
            --target ${{ matrix.target }} -p dbtool-cli \
            --no-default-features --features portable

      - name: Prepare binary artifact
        shell: bash
        run: |
          BIN=target/${{ matrix.target }}/release/dbtool${{ matrix.suffix }}
          mkdir -p dist-bin/${{ matrix.target }}
          cp "$BIN" dist-bin/${{ matrix.target }}/dbtool${{ matrix.suffix }}
          chmod +x dist-bin/${{ matrix.target }}/dbtool${{ matrix.suffix }}

      - name: Smoke binary artifact
        shell: bash
        run: scripts/smoke-binary.sh ${{ matrix.target }} dist-bin/${{ matrix.target }}/dbtool${{ matrix.suffix }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dbtool-bin-${{ matrix.target }}
          path: dist-bin/${{ matrix.target }}/dbtool${{ matrix.suffix }}

  package-release:
    name: Package release archives
    needs: build-matrix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package archives
        run: scripts/package-release.sh artifacts release-dist ${{ github.ref_name }}

      - name: Smoke packaged archives
        run: scripts/smoke-release-artifacts.sh release-dist

      - name: Upload release archives
        uses: actions/upload-artifact@v4
        with:
          name: dbtool-release-archives
          path: release-dist/*.tar.gz

  package-npm:
    name: Package npm wrappers
    needs: build-matrix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package npm tarballs
        run: node scripts/package-npm.mjs artifacts npm-dist ${{ github.ref_name }}

      - name: Install and run npm package
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          work="$(mktemp -d)"
          cd "$work"
          export npm_config_cache="$work/.npm-cache"
          npm init -y >/dev/null
          npm install \
            "$GITHUB_WORKSPACE/npm-dist/yovinchen-dbtool-linux-x64-${version}.tgz" \
            --offline --no-audit --no-fund
          npm install \
            "$GITHUB_WORKSPACE/npm-dist/yovinchen-dbtool-${version}.tgz" \
            --omit=optional --offline --no-audit --no-fund
          ./node_modules/.bin/dbtool --version | grep -F "$version"

      - name: Upload npm packages
        uses: actions/upload-artifact@v4
        with:
          name: dbtool-npm-packages
          path: npm-dist/*.tgz

  package-python:
    name: Package pip/uv wheels
    needs: build-matrix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package wheels
        run: python3 scripts/package-python-wheel.py artifacts python-dist ${{ github.ref_name }}

      - name: Install and run Python wheel
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          docker run --rm \
            -e DBTOOL_EXPECTED_VERSION="$version" \
            -v "$PWD/python-dist:/dist:ro" \
            python:3.12-alpine \
            sh -ceu 'pip install --no-index /dist/dbtool_bin-*-musllinux_1_2_x86_64.whl; dbtool --version | grep -F "$DBTOOL_EXPECTED_VERSION"'

      - name: Upload Python wheels
        uses: actions/upload-artifact@v4
        with:
          name: dbtool-python-wheels
          path: python-dist/*.whl

  release:
    name: Create GitHub Release
    needs:
      - package-release
      - package-npm
      - package-python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dbtool-release-archives
          path: release-dist

      - uses: actions/download-artifact@v4
        with:
          name: dbtool-npm-packages
          path: npm-dist

      - uses: actions/download-artifact@v4
        with:
          name: dbtool-python-wheels
          path: python-dist

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-dist/*.tar.gz
            npm-dist/*.tgz
            python-dist/*.whl
          generate_release_notes: true
