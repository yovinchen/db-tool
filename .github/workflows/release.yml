name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  validate-release:
    name: Validate release version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: dtolnay/rust-toolchain@stable

      - name: Require tag to match workspace version
        run: scripts/validate-release-version.sh "${{ github.ref_name }}"

  build-macos-arm64:
    name: Build macOS ARM64
    needs: validate-release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Build
        run: cargo build --release --target aarch64-apple-darwin -p dbtool-cli --no-default-features --features portable

      - name: Prepare binary artifact
        run: |
          mkdir -p dist-bin/aarch64-apple-darwin
          cp target/aarch64-apple-darwin/release/dbtool dist-bin/aarch64-apple-darwin/dbtool
          chmod +x dist-bin/aarch64-apple-darwin/dbtool

      - name: Smoke binary artifact
        run: scripts/smoke-binary.sh aarch64-apple-darwin dist-bin/aarch64-apple-darwin/dbtool

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dbtool-bin-aarch64-apple-darwin
          path: dist-bin/aarch64-apple-darwin/dbtool

  package-release:
    name: Package macOS ARM64 release
    needs: build-macos-arm64
    runs-on: macos-latest
    env:
      DBTOOL_PACKAGE_TARGETS: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v6.0.3

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package archives
        run: scripts/package-release.sh artifacts release-dist ${{ github.ref_name }}

      - name: Smoke packaged archives
        run: scripts/smoke-release-artifacts.sh release-dist

      - name: Generate SHA-256 checksum
        working-directory: release-dist
        run: shasum -a 256 dbtool-${{ github.ref_name }}-aarch64-apple-darwin.tar.gz > dbtool-${{ github.ref_name }}-aarch64-apple-darwin.tar.gz.sha256

      - name: Upload release archives
        uses: actions/upload-artifact@v4
        with:
          name: dbtool-release-archives
          path: |
            release-dist/*.tar.gz
            release-dist/*.sha256

  release:
    name: Create GitHub Release
    needs: package-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dbtool-release-archives
          path: release-dist

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-dist/*.tar.gz
            release-dist/*.sha256
          generate_release_notes: true
          prerelease: true
