name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-matrix:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            use_cross: true
            suffix: ""
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            use_cross: true
            suffix: ""
          - target: x86_64-apple-darwin
            runner: macos-latest
            use_cross: false
            suffix: ""
          - target: aarch64-apple-darwin
            runner: macos-latest
            use_cross: false
            suffix: ""
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            use_cross: false
            suffix: ".exe"
          - target: aarch64-pc-windows-msvc
            runner: windows-latest
            use_cross: false
            suffix: ".exe"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build
        shell: bash
        run: |
          ${{ matrix.use_cross && 'cross' || 'cargo' }} build --release \
            --target ${{ matrix.target }} -p dbtool-cli

      - name: Package
        shell: bash
        run: |
          BIN=target/${{ matrix.target }}/release/dbtool${{ matrix.suffix }}
          ARCHIVE=dbtool-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
          tar czf "$ARCHIVE" -C "$(dirname $BIN)" "$(basename $BIN)"
          echo "ARCHIVE=$ARCHIVE" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dbtool-${{ matrix.target }}
          path: ${{ env.ARCHIVE }}

  release:
    name: Create GitHub Release
    needs: build-matrix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.tar.gz
          generate_release_notes: true
