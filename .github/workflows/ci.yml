name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:
    inputs:
      run_live_services:
        description: "Run Docker-backed SQL/KV/document integration tests"
        required: false
        type: boolean
        default: false
      run_live_compat:
        description: "Run Docker-backed compatible database integration tests"
        required: false
        type: boolean
        default: false
      run_live_pg_compat:
        description: "Run Docker-backed PostgreSQL-family compatibility tests"
        required: false
        type: boolean
        default: false
      run_live_redshift:
        description: "Run env-gated external Redshift compatibility smoke"
        required: false
        type: boolean
        default: false
      run_live_sqlserver:
        description: "Run Docker-backed SQL Server integration tests"
        required: false
        type: boolean
        default: false
      run_live_cassandra:
        description: "Run Docker-backed Cassandra/CQL integration tests"
        required: false
        type: boolean
        default: false
      run_live_scylla:
        description: "Run Docker-backed product-native ScyllaDB/CQL integration tests"
        required: false
        type: boolean
        default: false
      run_live_tidb:
        description: "Run Docker-backed TiDB compatibility integration tests"
        required: false
        type: boolean
        default: false
      run_live_tidb_secure:
        description: "Run Docker-backed TiDB auth/TLS/HA integration tests"
        required: false
        type: boolean
        default: false
      run_live_tidb_ha_drill:
        description: "Run Docker-backed TiDB secure HA failover drill"
        required: false
        type: boolean
        default: false
      run_live_tidb_tiproxy:
        description: "Run Docker-backed TiDB TiProxy failover drill"
        required: false
        type: boolean
        default: false
      run_live_messaging:
        description: "Run Docker-backed messaging integration tests"
        required: false
        type: boolean
        default: false
      run_live_messaging_tls:
        description: "Run Docker-backed AMQPS and NATS TLS integration tests"
        required: false
        type: boolean
        default: false
      run_live_messaging_native:
        description: "Run Docker-backed messaging integration tests with native Kafka"
        required: false
        type: boolean
        default: false
      run_live_kafka_vendors:
        description: "Run env-gated AutoMQ/WarpStream/Confluent smoke tests"
        required: false
        type: boolean
        default: false
      run_live_observability:
        description: "Run Docker-backed OpenSearch and Prometheus integration tests"
        required: false
        type: boolean
        default: false
      run_live_opensearch_security:
        description: "Run Docker-backed OpenSearch security-plugin TLS integration tests"
        required: false
        type: boolean
        default: false
      run_live_elasticsearch:
        description: "Run Docker-backed product-native Elasticsearch integration tests"
        required: false
        type: boolean
        default: false
      run_live_db2:
        description: "Run Docker-backed IBM Db2 integration tests (needs IBM ODBC driver + unixODBC)"
        required: false
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  verify:
    name: Service-free verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      - name: Install Db2 link dependency
        run: sudo apt-get install -y unixodbc-dev

      - name: Verify
        run: ./scripts/verify.sh

  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      - name: Install native adapter build dependencies
        run: sudo apt-get install -y libcurl4-openssl-dev unixodbc-dev

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Feature build matrix
        run: ./scripts/validate-feature-matrix.sh

      - name: Clippy (default features)
        run: cargo clippy --workspace -- -D warnings

      - name: Clippy (full pure Kafka CLI)
        run: cargo clippy -p dbtool-cli --no-default-features --features full --all-targets -- -D warnings

      - name: Clippy (portable release CLI)
        run: cargo clippy -p dbtool-cli --no-default-features --features portable --all-targets -- -D warnings

      - name: Clippy (full native Kafka CLI)
        run: cargo clippy -p dbtool-cli --no-default-features --features full-native --all-targets -- -D warnings

      - name: Clippy (full TUI)
        run: cargo clippy -p dbtool-tui --no-default-features --features full --all-targets -- -D warnings

  compose-config:
    name: Compose config validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3

      - name: Validate integration compose configs
        run: ./scripts/validate-compose-configs.sh

  test:
    name: Tests
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install unixODBC (Linux — needed by adapter-db2)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y unixodbc-dev

      - name: Install unixODBC (macOS — needed by adapter-db2)
        if: runner.os == 'macOS'
        run: brew install unixodbc

      - name: Unit tests
        run: cargo test --workspace --lib

      - name: Doc tests
        run: cargo test --workspace --doc

      - name: Windows atomic file replacement tests
        if: runner.os == 'Windows'
        run: cargo test -p dbtool-core --lib service::atomic_file::tests

      - name: Windows transfer artifact replacement test
        if: runner.os == 'Windows'
        run: cargo test -p dbtool-cli --bin dbtool cmd::transfer::tests::artifact_publish_replaces_existing_target_and_leaves_no_temp_file -- --exact

  build-matrix:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            use_cross: true
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            use_cross: true
          - target: x86_64-apple-darwin
            runner: macos-latest
            use_cross: false
          - target: aarch64-apple-darwin
            runner: macos-latest
            use_cross: false
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            use_cross: false
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Install unixODBC (Linux native — needed by adapter-db2)
        if: "!matrix.use_cross && runner.os == 'Linux'"
        run: sudo apt-get install -y unixodbc-dev

      - name: Install unixODBC (macOS — needed by adapter-db2)
        if: runner.os == 'macOS'
        run: brew install unixodbc

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (cargo)
        if: "!matrix.use_cross"
        run: cargo build --release --target ${{ matrix.target }} -p dbtool-cli

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }} -p dbtool-cli

  windows-portable-pr:
    name: Windows portable PR gate (${{ matrix.target }})
    if: github.event_name == 'pull_request'
    runs-on: windows-latest
    strategy:
      matrix:
        target:
          - x86_64-pc-windows-msvc
          - aarch64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Build portable Windows release
        run: cargo build --release --target ${{ matrix.target }} -p dbtool-cli --no-default-features --features portable

  integration-services:
    name: Live services integration
    if: github.event_name == 'workflow_dispatch' && inputs.run_live_services
    runs-on: ubuntu-latest
    env:
      DBTOOL_IT_PROJECT: dbtool-it-ci-data
      DBTOOL_IT_POSTGRES_PORT: 25432
      DBTOOL_IT_MYSQL_PORT: 23306
      DBTOOL_IT_REDIS_PORT: 26379
      DBTOOL_IT_MONGO_PORT: 27017
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Run SQL/KV/document integration tests
        run: ./scripts/integration-test.sh

  integration-compat:
    name: Live compatibility integration
    if: github.event_name == 'workflow_dispatch' && inputs.run_live_compat
    runs-on: ubuntu-latest
    env:
      DBTOOL_IT_PROJECT: dbtool-it-ci-compat
      DBTOOL_IT_MARIADB_PORT: 33306
      DBTOOL_IT_VALKEY_PORT: 36379
      DBTOOL_IT_KEYDB_PORT: 36380
      DBTOOL_IT_DRAGONFLY_PORT: 36381
      DBTOOL_IT_COMPAT_EXTRA: 1
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Run compatible database integration tests
        run: ./scripts/integration-compat-test.sh

  integration-pg-compat:
    name: Live PostgreSQL-family compatibility integration
    if: github.event_name == 'workflow_dispatch' && inputs.run_live_pg_compat
    runs-on: ubuntu-latest
    env:
      DBTOOL_IT_PROJECT: dbtool-it-ci-pg-compat
      DBTOOL_IT_COCKROACH_PORT: 36257
      DBTOOL_IT_COCKROACH_HTTP_PORT: 38080
      DBTOOL_IT_TIMESCALE_PORT: 35432
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Run PostgreSQL-family compatibility tests
        run: ./scripts/integration-pg-compat-test.sh

  integration-redshift:
    name: External Redshift compatibility smoke
    if: github.event_name == 'workflow_dispatch' && inputs.run_live_redshift
    runs-on: ubuntu-latest
    env:
      DBTOOL_IT_REDSHIFT_DSN: ${{ secrets.DBTOOL_IT_REDSHIFT_DSN }}
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Run Redshift compatibility smoke
        run: ./scripts/integration-redshift-test.sh

  integration-sqlserver:
    name: Live SQL Server integration
    if: github.event_name == 'workflow_dispatch' && inputs.run_live_sqlserver
    runs-on: ubuntu-latest
    env:
      DBTOOL_IT_PROJECT: dbtool-it-ci-sqlserver
      DBTOOL_IT_SQLSERVER_PORT: 31433
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Run SQL Server integration tests
        run: ./scripts/integration-sqlserver-test.sh

  integration-cassandra:
    name: Live Cassandra/CQL integration
    if: github.event_name == 'workflow_dispatch' && inputs.run_live_cassandra
    runs-on: ubuntu-latest
    env:
      DBTOOL_IT_PROJECT: dbtool-it-ci-cassandra
      DBTOOL_IT_CASSANDRA_PORT: 39042
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Run Cassandra/CQL integration tests
        run: ./scripts/integration-cassandra-test.sh

  integration-scylla:
    name: Live product-native ScyllaDB/CQL integration
    if: github.event_name == 'workflow_dispatch' && inputs.run_live_scylla
    runs-on: ubuntu-latest
    env:
      DBTOOL_IT_PROJECT: dbtool-it-ci-scylla
      DBTOOL_IT_SCYLLA_PORT: 49042
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Run product-native ScyllaDB/CQL integration tests
        run: ./scripts/integration-scylla-test.sh

  integration-tidb:
    name: Live TiDB compatibility integration
    if: github.event_name == 'workflow_dispatch' && inputs.run_live_tidb
    runs-on: ubuntu-latest
    env:
      DBTOOL_IT_PROJECT: dbtool-it-ci-tidb
      DBTOOL_IT_TIDB_PORT: 34000
      DBTOOL_IT_TIDB_STATUS_PORT: 31080
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Run TiDB compatibility integration tests
        run: ./scripts/integration-tidb-test.sh

  integration-tidb-secure:
    name: Live TiDB auth/TLS/HA integration
    if: github.event_name == 'workflow_dispatch' && inputs.run_live_tidb_secure
    runs-on: ubuntu-latest
    env:
      DBTOOL_IT_PROJECT: dbtool-it-ci-tidb-secure
      DBTOOL_IT_TIDB_SECURE_PORT_1: 34100
      DBTOOL_IT_TIDB_SECURE_PORT_2: 34101
      DBTOOL_IT_TIDB_SECURE_STATUS_PORT_1: 31100
      DBTOOL_IT_TIDB_SECURE_STATUS_PORT_2: 31101
      DBTOOL_IT_TIDB_SECURE_TIKV_CPUS: 1.00
      DBTOOL_IT_TIDB_SECURE_TIKV_MEMORY: 1536m
      DBTOOL_IT_TIDB_SECURE_TIKV_BOOTSTRAP_DELAY: 45
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Run TiDB auth/TLS/HA integration tests
        run: ./scripts/integration-tidb-secure-test.sh

  integration-tidb-ha-drill:
    name: Live TiDB secure HA failover drill
    if: github.event_name == 'workflow_dispatch' && inputs.run_live_tidb_ha_drill
    runs-on: ubuntu-latest
    env:
      DBTOOL_IT_PROJECT: dbtool-it-ci-tidb-ha-drill
      DBTOOL_IT_TIDB_SECURE_PORT_1: 44100
      DBTOOL_IT_TIDB_SECURE_PORT_2: 44101
      DBTOOL_IT_TIDB_SECURE_STATUS_PORT_1: 41100
      DBTOOL_IT_TIDB_SECURE_STATUS_PORT_2: 41101
      DBTOOL_IT_TIDB_SECURE_TIKV_CPUS: 1.00
      DBTOOL_IT_TIDB_SECURE_TIKV_MEMORY: 1536m
      DBTOOL_IT_TIDB_SECURE_TIKV_BOOTSTRAP_DELAY: 45
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Run TiDB secure HA failover drill
        run: ./scripts/integration-tidb-ha-drill.sh

  integration-tidb-tiproxy:
    name: Live TiDB TiProxy failover drill
    if: github.event_name == 'workflow_dispatch' && inputs.run_live_tidb_tiproxy
    runs-on: ubuntu-latest
    env:
      DBTOOL_IT_PROJECT: dbtool-it-ci-tidb-tiproxy
      DBTOOL_IT_TIDB_SECURE_PORT_1: 54100
      DBTOOL_IT_TIDB_SECURE_PORT_2: 54101
      DBTOOL_IT_TIDB_SECURE_STATUS_PORT_1: 51100
      DBTOOL_IT_TIDB_SECURE_STATUS_PORT_2: 51101
      DBTOOL_IT_TIDB_TIPROXY_PORT: 54200
      DBTOOL_IT_TIDB_TIPROXY_STATUS_PORT: 51200
      DBTOOL_IT_TIDB_SECURE_TIKV_CPUS: 1.00
      DBTOOL_IT_TIDB_SECURE_TIKV_MEMORY: 1536m
      DBTOOL_IT_TIDB_SECURE_TIKV_BOOTSTRAP_DELAY: 45
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Run TiDB TiProxy failover drill
