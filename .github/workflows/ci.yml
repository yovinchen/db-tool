name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:
    inputs:
      run_live_services:
        description: "Run Docker-backed SQL/KV/document integration tests"
        required: false
        type: boolean
        default: false
      run_live_compat:
        description: "Run Docker-backed compatible database integration tests"
        required: false
        type: boolean
        default: false
      run_live_tidb:
        description: "Run Docker-backed TiDB compatibility integration tests"
        required: false
        type: boolean
        default: false
      run_live_tidb_secure:
        description: "Run Docker-backed TiDB auth/TLS/HA integration tests"
        required: false
        type: boolean
        default: false
      run_live_messaging:
        description: "Run Docker-backed messaging integration tests"
        required: false
        type: boolean
        default: false
      run_live_messaging_native:
        description: "Run Docker-backed messaging integration tests with native Kafka"
        required: false
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  verify:
    name: Service-free verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      - name: Verify
        run: ./scripts/verify.sh

  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy (default features)
        run: cargo clippy --workspace -- -D warnings

      - name: Clippy (full)
        run: cargo clippy --workspace --features dbtool-registry/full -- -D warnings

  compose-config:
    name: Compose config validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate base integration compose config
        run: docker compose -f docker-compose.integration.yml config

      - name: Validate compatibility integration compose config
        run: docker compose -f docker-compose.integration.yml --profile compat --profile compat-extra config

      - name: Validate TiDB integration compose config
        run: docker compose -f docker-compose.integration.yml --profile tidb config

      - name: Validate TiDB secure HA integration compose config
        run: docker compose -f docker-compose.integration.yml --profile tidb-secure config

      - name: Validate messaging integration compose config
        run: docker compose -f docker-compose.integration.yml --profile messaging config

  test:
    name: Tests
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Unit tests
        run: cargo test --workspace --lib

      - name: Doc tests
        run: cargo test --workspace --doc

  build-matrix:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            use_cross: true
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            use_cross: true
          - target: x86_64-apple-darwin
            runner: macos-latest
            use_cross: false
          - target: aarch64-apple-darwin
            runner: macos-latest
            use_cross: false
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            use_cross: false
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (cargo)
        if: "!matrix.use_cross"
        run: cargo build --release --target ${{ matrix.target }} -p dbtool-cli

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }} -p dbtool-cli

  integration-services:
    name: Live services integration
    if: github.event_name == 'workflow_dispatch' && inputs.run_live_services
    runs-on: ubuntu-latest
    env:
      DBTOOL_IT_PROJECT: dbtool-it-ci-data
      DBTOOL_IT_POSTGRES_PORT: 25432
      DBTOOL_IT_MYSQL_PORT: 23306
      DBTOOL_IT_REDIS_PORT: 26379
      DBTOOL_IT_MONGO_PORT: 27017
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Run SQL/KV/document integration tests
        run: ./scripts/integration-test.sh

  integration-compat:
    name: Live compatibility integration
    if: github.event_name == 'workflow_dispatch' && inputs.run_live_compat
    runs-on: ubuntu-latest
    env:
      DBTOOL_IT_PROJECT: dbtool-it-ci-compat
      DBTOOL_IT_MARIADB_PORT: 33306
      DBTOOL_IT_VALKEY_PORT: 36379
      DBTOOL_IT_KEYDB_PORT: 36380
      DBTOOL_IT_DRAGONFLY_PORT: 36381
      DBTOOL_IT_COMPAT_EXTRA: 1
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Run compatible database integration tests
        run: ./scripts/integration-compat-test.sh

  integration-tidb:
    name: Live TiDB compatibility integration
    if: github.event_name == 'workflow_dispatch' && inputs.run_live_tidb
    runs-on: ubuntu-latest
    env:
      DBTOOL_IT_PROJECT: dbtool-it-ci-tidb
      DBTOOL_IT_TIDB_PORT: 34000
      DBTOOL_IT_TIDB_STATUS_PORT: 31080
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Run TiDB compatibility integration tests
        run: ./scripts/integration-tidb-test.sh

  integration-tidb-secure:
    name: Live TiDB auth/TLS/HA integration
    if: github.event_name == 'workflow_dispatch' && inputs.run_live_tidb_secure
    runs-on: ubuntu-latest
    env:
      DBTOOL_IT_PROJECT: dbtool-it-ci-tidb-secure
      DBTOOL_IT_TIDB_SECURE_PORT_1: 34100
      DBTOOL_IT_TIDB_SECURE_PORT_2: 34101
      DBTOOL_IT_TIDB_SECURE_STATUS_PORT_1: 31100
      DBTOOL_IT_TIDB_SECURE_STATUS_PORT_2: 31101
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Run TiDB auth/TLS/HA integration tests
        run: ./scripts/integration-tidb-secure-test.sh

  integration-messaging:
    name: Live messaging integration
    if: github.event_name == 'workflow_dispatch' && inputs.run_live_messaging
    runs-on: ubuntu-latest
    env:
      DBTOOL_IT_PROJECT: dbtool-it-ci-mq
      DBTOOL_IT_REDIS_PORT: 36379
      DBTOOL_IT_KAFKA_PORT: 29092
      DBTOOL_IT_KAFKA_ADMIN_PORT: 29644
      DBTOOL_IT_AMQP_PORT: 25672
      DBTOOL_IT_NATS_PORT: 24222
      DBTOOL_IT_NATS_MONITOR_PORT: 28222
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Run messaging integration tests
        run: ./scripts/integration-mq-test.sh

  integration-messaging-native:
    name: Live messaging native Kafka integration
    if: github.event_name == 'workflow_dispatch' && inputs.run_live_messaging_native
    runs-on: ubuntu-latest
    env:
      DBTOOL_IT_PROJECT: dbtool-it-ci-mq-native
      DBTOOL_IT_REDIS_PORT: 46379
      DBTOOL_IT_KAFKA_PORT: 39092
      DBTOOL_IT_KAFKA_ADMIN_PORT: 39644
      DBTOOL_IT_AMQP_PORT: 35672
      DBTOOL_IT_NATS_PORT: 34222
      DBTOOL_IT_NATS_MONITOR_PORT: 38222
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Run native Kafka messaging integration tests
        run: ./scripts/integration-mq-native-test.sh
