  integration-messaging:
    name: Live messaging integration
    if: github.event_name == 'workflow_dispatch' && inputs.run_live_messaging
    runs-on: ubuntu-latest
    env:
      DBTOOL_IT_PROJECT: dbtool-it-ci-mq
      DBTOOL_IT_REDIS_PORT: 36379
      DBTOOL_IT_KAFKA_PORT: 29092
      DBTOOL_IT_KAFKA_ADMIN_PORT: 29644
      DBTOOL_IT_AMQP_PORT: 25672
      DBTOOL_IT_NATS_PORT: 24222
      DBTOOL_IT_NATS_MONITOR_PORT: 28222
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Run messaging integration tests
        run: ./scripts/integration-mq-test.sh

  integration-messaging-tls:
    name: Live messaging TLS integration
    if: github.event_name == 'workflow_dispatch' && inputs.run_live_messaging_tls
    runs-on: ubuntu-latest
    env:
      DBTOOL_IT_PROJECT: dbtool-it-ci-mq-tls
      DBTOOL_IT_AMQPS_PORT: 45671
      DBTOOL_IT_NATS_TLS_PORT: 44222
      DBTOOL_IT_NATS_TLS_MONITOR_PORT: 48222
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Run messaging TLS integration tests
        run: ./scripts/integration-mq-tls-test.sh

  integration-messaging-native:
    name: Live messaging native Kafka integration
    if: github.event_name == 'workflow_dispatch' && inputs.run_live_messaging_native
    runs-on: ubuntu-latest
    env:
      DBTOOL_IT_PROJECT: dbtool-it-ci-mq-native
      DBTOOL_IT_REDIS_PORT: 46379
      DBTOOL_IT_KAFKA_PORT: 39092
      DBTOOL_IT_KAFKA_ADMIN_PORT: 39644
      DBTOOL_IT_AMQP_PORT: 35672
      DBTOOL_IT_NATS_PORT: 34222
      DBTOOL_IT_NATS_MONITOR_PORT: 38222
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Run native Kafka messaging integration tests
        run: ./scripts/integration-mq-native-test.sh

  integration-kafka-vendors:
    name: External Kafka-compatible vendor smoke
    if: github.event_name == 'workflow_dispatch' && inputs.run_live_kafka_vendors
    runs-on: ubuntu-latest
    env:
      DBTOOL_IT_AUTOMQ_DSN: ${{ secrets.DBTOOL_IT_AUTOMQ_DSN }}
      DBTOOL_IT_WARPSTREAM_DSN: ${{ secrets.DBTOOL_IT_WARPSTREAM_DSN }}
      DBTOOL_IT_CONFLUENT_DSN: ${{ secrets.DBTOOL_IT_CONFLUENT_DSN }}
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Run vendor Kafka smoke tests
        run: ./scripts/integration-kafka-vendor-test.sh

  integration-observability:
    name: Live observability integration
    if: github.event_name == 'workflow_dispatch' && inputs.run_live_observability
    runs-on: ubuntu-latest
    env:
      DBTOOL_IT_PROJECT: dbtool-it-ci-observability
      DBTOOL_IT_OPENSEARCH_PORT: 29200
      DBTOOL_IT_OPENSEARCH_TLS_PORT: 29201
      DBTOOL_IT_PROMETHEUS_PORT: 29090
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Run observability integration tests
        run: ./scripts/integration-observability-test.sh

  integration-opensearch-security:
    name: Live OpenSearch security integration
    if: github.event_name == 'workflow_dispatch' && inputs.run_live_opensearch_security
    runs-on: ubuntu-latest
    env:
      DBTOOL_IT_PROJECT: dbtool-it-ci-opensearch-security
      DBTOOL_IT_OPENSEARCH_SECURITY_PORT: 29203
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Run OpenSearch security integration tests
        run: ./scripts/integration-opensearch-security-test.sh

  integration-elasticsearch:
    name: Live Elasticsearch integration
    if: github.event_name == 'workflow_dispatch' && inputs.run_live_elasticsearch
    runs-on: ubuntu-latest
    env:
      DBTOOL_IT_PROJECT: dbtool-it-ci-elasticsearch
      DBTOOL_IT_ELASTICSEARCH_PORT: 29202
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Run Elasticsearch integration tests
        run: ./scripts/integration-elasticsearch-test.sh

  integration-db2:
    name: Live IBM Db2 integration
    if: github.event_name == 'workflow_dispatch' && inputs.run_live_db2
    runs-on: ubuntu-latest
    env:
      DBTOOL_IT_PROJECT: dbtool-it-ci-db2
      DBTOOL_IT_DB2_PORT: 50000
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install unixODBC (compile-time dependency for adapter-db2)
        run: sudo apt-get install -y unixodbc-dev

      - name: Install IBM Data Server Driver for ODBC and CLI
        # Download the clidriver from IBM and register it with unixODBC.
        # The community-edition image ships with the driver inside the container;
        # the host build only needs the driver manager headers (unixodbc-dev)
        # plus the shared library at runtime. On CI the test binary connects to
        # localhost:50000 so a minimal ODBC driver setup is sufficient.
        run: |
          curl -fsSL "https://public.dhe.ibm.com/ibmdl/export/pub/software/data/db2/drivers/odbc_cli/v11.5.9/linuxx64_odbc_cli.tar.gz" \
            -o /tmp/db2odbc.tar.gz
          mkdir -p /opt/ibm/db2odbc
          tar -xzf /tmp/db2odbc.tar.gz -C /opt/ibm/db2odbc --strip-components=1
          # Register driver with the system ODBC driver manager
          sudo tee -a /etc/odbcinst.ini >/dev/null <<EOF
          [IBM DB2 ODBC DRIVER]
          Description = IBM DB2 ODBC Driver
          Driver      = /opt/ibm/db2odbc/lib/libdb2o.so
          FileUsage   = 1
          EOF
          odbcinst -q -d

      - name: Run IBM Db2 integration tests
        run: ./scripts/integration-db2-test.sh
