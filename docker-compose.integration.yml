name: ${DBTOOL_IT_PROJECT:-dbtool-it}

services:
  postgres:
    image: postgres:16-alpine
    container_name: ${DBTOOL_IT_PROJECT:-dbtool-it}-postgres
    environment:
      POSTGRES_DB: ${DBTOOL_IT_POSTGRES_DB:-dbtool_it_pg}
      POSTGRES_USER: ${DBTOOL_IT_POSTGRES_USER:-dbtool}
      POSTGRES_PASSWORD: ${DBTOOL_IT_POSTGRES_PASSWORD:-dbtool}
    ports:
      - "${DBTOOL_IT_POSTGRES_PORT:-15432}:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DBTOOL_IT_POSTGRES_USER:-dbtool} -d ${DBTOOL_IT_POSTGRES_DB:-dbtool_it_pg}",
        ]
      interval: 2s
      timeout: 3s
      retries: 30
    cpus: ${DBTOOL_IT_POSTGRES_CPUS:-0.50}
    mem_limit: ${DBTOOL_IT_POSTGRES_MEMORY:-512m}

  mysql:
    image: mysql:8.4
    container_name: ${DBTOOL_IT_PROJECT:-dbtool-it}-mysql
    environment:
      MYSQL_DATABASE: ${DBTOOL_IT_MYSQL_DB:-dbtool_it_mysql}
      MYSQL_USER: ${DBTOOL_IT_MYSQL_USER:-dbtool}
      MYSQL_PASSWORD: ${DBTOOL_IT_MYSQL_PASSWORD:-dbtool}
      MYSQL_ROOT_PASSWORD: ${DBTOOL_IT_MYSQL_ROOT_PASSWORD:-dbtool_root}
    command:
      [
        "mysqld",
        "--mysql-native-password=ON",
        "--max-connections=40",
        "--performance-schema=OFF",
      ]
    ports:
      - "${DBTOOL_IT_MYSQL_PORT:-13306}:3306"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -u${DBTOOL_IT_MYSQL_USER:-dbtool} -p${DBTOOL_IT_MYSQL_PASSWORD:-dbtool} --silent",
        ]
      interval: 3s
      timeout: 5s
      retries: 40
    cpus: ${DBTOOL_IT_MYSQL_CPUS:-0.75}
    mem_limit: ${DBTOOL_IT_MYSQL_MEMORY:-768m}

  mariadb:
    profiles: ["compat"]
    image: mariadb:11.4
    container_name: ${DBTOOL_IT_PROJECT:-dbtool-it}-mariadb
    environment:
      MARIADB_DATABASE: ${DBTOOL_IT_MARIADB_DB:-dbtool_it_mariadb}
      MARIADB_USER: ${DBTOOL_IT_MARIADB_USER:-dbtool}
      MARIADB_PASSWORD: ${DBTOOL_IT_MARIADB_PASSWORD:-dbtool}
      MARIADB_ROOT_PASSWORD: ${DBTOOL_IT_MARIADB_ROOT_PASSWORD:-dbtool_root}
    command:
      [
        "mariadbd",
        "--max-connections=40",
        "--performance-schema=OFF",
      ]
    ports:
      - "${DBTOOL_IT_MARIADB_PORT:-23306}:3306"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mariadb-admin ping -h 127.0.0.1 -u${DBTOOL_IT_MARIADB_USER:-dbtool} -p${DBTOOL_IT_MARIADB_PASSWORD:-dbtool} --silent",
        ]
      interval: 3s
      timeout: 5s
      retries: 40
    cpus: ${DBTOOL_IT_MARIADB_CPUS:-0.50}
    mem_limit: ${DBTOOL_IT_MARIADB_MEMORY:-512m}

  cockroach:
    profiles: ["pg-compat"]
    image: cockroachdb/cockroach:${DBTOOL_IT_COCKROACH_VERSION:-v24.3.8}
    container_name: ${DBTOOL_IT_PROJECT:-dbtool-it}-cockroach
    command:
      [
        "start-single-node",
        "--insecure",
        "--listen-addr=:26257",
        "--http-addr=0.0.0.0:8080",
        "--cache=64MiB",
        "--max-sql-memory=64MiB",
      ]
    ports:
      - "${DBTOOL_IT_COCKROACH_PORT:-26257}:26257"
      - "${DBTOOL_IT_COCKROACH_HTTP_PORT:-28080}:8080"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/cockroach/cockroach sql --insecure --host=127.0.0.1:26257 --execute='select 1' >/dev/null 2>&1",
        ]
      interval: 3s
      timeout: 5s
      retries: 50
    cpus: ${DBTOOL_IT_COCKROACH_CPUS:-0.50}
    mem_limit: ${DBTOOL_IT_COCKROACH_MEMORY:-512m}

  timescale:
    profiles: ["pg-compat"]
    image: timescale/timescaledb:${DBTOOL_IT_TIMESCALE_VERSION:-2.17.2-pg16}
    container_name: ${DBTOOL_IT_PROJECT:-dbtool-it}-timescale
    environment:
      POSTGRES_DB: ${DBTOOL_IT_TIMESCALE_DB:-dbtool_it_timescale}
      POSTGRES_USER: ${DBTOOL_IT_TIMESCALE_USER:-dbtool}
      POSTGRES_PASSWORD: ${DBTOOL_IT_TIMESCALE_PASSWORD:-dbtool}
    ports:
      - "${DBTOOL_IT_TIMESCALE_PORT:-25432}:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DBTOOL_IT_TIMESCALE_USER:-dbtool} -d ${DBTOOL_IT_TIMESCALE_DB:-dbtool_it_timescale}",
        ]
      interval: 3s
      timeout: 5s
      retries: 40
    cpus: ${DBTOOL_IT_TIMESCALE_CPUS:-0.50}
    mem_limit: ${DBTOOL_IT_TIMESCALE_MEMORY:-512m}

  sqlserver:
    profiles: ["sqlserver"]
    image: mcr.microsoft.com/mssql/server:${DBTOOL_IT_SQLSERVER_VERSION:-2022-CU26-ubuntu-22.04}
    container_name: ${DBTOOL_IT_PROJECT:-dbtool-it}-sqlserver
    platform: ${DBTOOL_IT_SQLSERVER_PLATFORM:-linux/amd64}
    hostname: dbtool-it-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: ${DBTOOL_IT_SQLSERVER_PID:-Developer}
      MSSQL_SA_PASSWORD: ${DBTOOL_IT_SQLSERVER_PASSWORD:-Dbtool_SQLServer_123!}
    ports:
      - "${DBTOOL_IT_SQLSERVER_PORT:-11433}:1433"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "grep -q 'SQL Server is now ready for client connections' /var/opt/mssql/log/errorlog",
        ]
      interval: 5s
      timeout: 5s
      retries: 80
      start_period: 20s
    cpus: ${DBTOOL_IT_SQLSERVER_CPUS:-1.00}
    mem_limit: ${DBTOOL_IT_SQLSERVER_MEMORY:-2g}

  cassandra:
    profiles: ["cassandra"]
    image: cassandra:${DBTOOL_IT_CASSANDRA_VERSION:-5.0}
    container_name: ${DBTOOL_IT_PROJECT:-dbtool-it}-cassandra
    hostname: dbtool-it-cassandra
    environment:
      CASSANDRA_CLUSTER_NAME: dbtool-it
      CASSANDRA_DC: datacenter1
      CASSANDRA_RACK: rack1
      MAX_HEAP_SIZE: ${DBTOOL_IT_CASSANDRA_MAX_HEAP_SIZE:-512M}
      HEAP_NEWSIZE: ${DBTOOL_IT_CASSANDRA_HEAP_NEWSIZE:-128M}
    ports:
      - "${DBTOOL_IT_CASSANDRA_PORT:-19042}:9042"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "cqlsh 127.0.0.1 9042 -e 'DESCRIBE KEYSPACES' >/dev/null 2>&1",
        ]
      interval: 10s
      timeout: 10s
      retries: 60
      start_period: 45s
    cpus: ${DBTOOL_IT_CASSANDRA_CPUS:-1.00}
    mem_limit: ${DBTOOL_IT_CASSANDRA_MEMORY:-2g}

  scylla:
    profiles: ["scylla"]
    image: scylladb/scylla:${DBTOOL_IT_SCYLLA_VERSION:-2026.1.8}
    container_name: ${DBTOOL_IT_PROJECT:-dbtool-it}-scylla
    hostname: dbtool-it-scylla
    command:
      [
        "--smp",
        "1",
        "--memory",
        "${DBTOOL_IT_SCYLLA_DB_MEMORY:-384M}",
        "--overprovisioned",
        "1",
        "--developer-mode",
        "1",
      ]
    ports:
      - "${DBTOOL_IT_SCYLLA_PORT:-29042}:9042"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "cqlsh dbtool-it-scylla 9042 -e 'DESCRIBE KEYSPACES' >/dev/null 2>&1",
        ]
      interval: 10s
      timeout: 10s
      retries: 60
      start_period: 30s
    cpus: ${DBTOOL_IT_SCYLLA_CPUS:-1.00}
    mem_limit: ${DBTOOL_IT_SCYLLA_MEMORY:-2g}

  tidb-pd:
    profiles: ["tidb"]
    image: pingcap/pd:${DBTOOL_IT_TIDB_VERSION:-v8.5.6}
    container_name: ${DBTOOL_IT_PROJECT:-dbtool-it}-tidb-pd
    command:
      [
        "--name=pd",
        "--data-dir=/tmp/pd",
        "--client-urls=http://0.0.0.0:2379",
        "--peer-urls=http://0.0.0.0:2380",
        "--advertise-client-urls=http://tidb-pd:2379",
        "--advertise-peer-urls=http://tidb-pd:2380",
        "--initial-cluster=pd=http://tidb-pd:2380",
      ]
    cpus: ${DBTOOL_IT_TIDB_PD_CPUS:-0.25}
    mem_limit: ${DBTOOL_IT_TIDB_PD_MEMORY:-256m}

  tidb-tikv:
    profiles: ["tidb"]
    image: pingcap/tikv:${DBTOOL_IT_TIDB_VERSION:-v8.5.6}
    container_name: ${DBTOOL_IT_PROJECT:-dbtool-it}-tidb-tikv
    command:
      [
        "--addr=0.0.0.0:20160",
        "--advertise-addr=tidb-tikv:20160",
        "--status-addr=0.0.0.0:20180",
        "--pd=tidb-pd:2379",
        "--data-dir=/tmp/tikv",
      ]
    depends_on:
      - tidb-pd
    ulimits:
      nofile:
        soft: ${DBTOOL_IT_TIDB_TIKV_NOFILE_SOFT:-200000}
        hard: ${DBTOOL_IT_TIDB_TIKV_NOFILE_HARD:-200000}
    cpus: ${DBTOOL_IT_TIDB_TIKV_CPUS:-0.75}
    mem_limit: ${DBTOOL_IT_TIDB_TIKV_MEMORY:-1g}

  tidb:
    profiles: ["tidb"]
    image: pingcap/tidb:${DBTOOL_IT_TIDB_VERSION:-v8.5.6}
    container_name: ${DBTOOL_IT_PROJECT:-dbtool-it}-tidb
    command:
      [
        "--store=tikv",
        "--path=tidb-pd:2379",
        "--host=0.0.0.0",
        "--advertise-address=tidb",
        "-P=4000",
        "--status=10080",
      ]
    depends_on:
      - tidb-pd
      - tidb-tikv
    ports:
      - "${DBTOOL_IT_TIDB_PORT:-14000}:4000"
      - "${DBTOOL_IT_TIDB_STATUS_PORT:-11080}:10080"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:10080/status >/dev/null 2>&1 || exit 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 60
    cpus: ${DBTOOL_IT_TIDB_CPUS:-0.50}
    mem_limit: ${DBTOOL_IT_TIDB_MEMORY:-512m}

  tidb-secure-pd-1:
    profiles: ["tidb-secure"]
    image: pingcap/pd:${DBTOOL_IT_TIDB_VERSION:-v8.5.6}
    container_name: ${DBTOOL_IT_PROJECT:-dbtool-it}-tidb-secure-pd-1
    command:
      [
        "--name=pd-1",
        "--data-dir=/tmp/pd",
        "--client-urls=https://0.0.0.0:2379",
        "--peer-urls=https://0.0.0.0:2380",
        "--advertise-client-urls=https://tidb-secure-pd-1:2379",
        "--advertise-peer-urls=https://tidb-secure-pd-1:2380",
        "--initial-cluster=pd-1=https://tidb-secure-pd-1:2380,pd-2=https://tidb-secure-pd-2:2380,pd-3=https://tidb-secure-pd-3:2380",
        "--cacert=/tidb-secure/certs/ca.pem",
        "--cert=/tidb-secure/certs/server.pem",
        "--key=/tidb-secure/certs/server-key.pem",
      ]
    volumes:
      - "${DBTOOL_IT_TIDB_SECURE_DIR:-.tmp/dbtool-it-tidb-secure}:/tidb-secure:ro"
    cpus: ${DBTOOL_IT_TIDB_SECURE_PD_CPUS:-0.25}
    mem_limit: ${DBTOOL_IT_TIDB_SECURE_PD_MEMORY:-256m}

  tidb-secure-pd-2:
    profiles: ["tidb-secure"]
    image: pingcap/pd:${DBTOOL_IT_TIDB_VERSION:-v8.5.6}
    container_name: ${DBTOOL_IT_PROJECT:-dbtool-it}-tidb-secure-pd-2
    command:
      [
        "--name=pd-2",
        "--data-dir=/tmp/pd",
        "--client-urls=https://0.0.0.0:2379",
        "--peer-urls=https://0.0.0.0:2380",
        "--advertise-client-urls=https://tidb-secure-pd-2:2379",
        "--advertise-peer-urls=https://tidb-secure-pd-2:2380",
        "--initial-cluster=pd-1=https://tidb-secure-pd-1:2380,pd-2=https://tidb-secure-pd-2:2380,pd-3=https://tidb-secure-pd-3:2380",
        "--cacert=/tidb-secure/certs/ca.pem",
        "--cert=/tidb-secure/certs/server.pem",
        "--key=/tidb-secure/certs/server-key.pem",
      ]
    volumes:
      - "${DBTOOL_IT_TIDB_SECURE_DIR:-.tmp/dbtool-it-tidb-secure}:/tidb-secure:ro"
    cpus: ${DBTOOL_IT_TIDB_SECURE_PD_CPUS:-0.25}
    mem_limit: ${DBTOOL_IT_TIDB_SECURE_PD_MEMORY:-256m}

  tidb-secure-pd-3:
    profiles: ["tidb-secure"]
    image: pingcap/pd:${DBTOOL_IT_TIDB_VERSION:-v8.5.6}
    container_name: ${DBTOOL_IT_PROJECT:-dbtool-it}-tidb-secure-pd-3
    command:
      [
        "--name=pd-3",
        "--data-dir=/tmp/pd",
        "--client-urls=https://0.0.0.0:2379",
        "--peer-urls=https://0.0.0.0:2380",
        "--advertise-client-urls=https://tidb-secure-pd-3:2379",
        "--advertise-peer-urls=https://tidb-secure-pd-3:2380",
        "--initial-cluster=pd-1=https://tidb-secure-pd-1:2380,pd-2=https://tidb-secure-pd-2:2380,pd-3=https://tidb-secure-pd-3:2380",
        "--cacert=/tidb-secure/certs/ca.pem",
        "--cert=/tidb-secure/certs/server.pem",
        "--key=/tidb-secure/certs/server-key.pem",
      ]
    volumes:
      - "${DBTOOL_IT_TIDB_SECURE_DIR:-.tmp/dbtool-it-tidb-secure}:/tidb-secure:ro"
    cpus: ${DBTOOL_IT_TIDB_SECURE_PD_CPUS:-0.25}
    mem_limit: ${DBTOOL_IT_TIDB_SECURE_PD_MEMORY:-256m}

  tidb-secure-tikv-1:
    profiles: ["tidb-secure"]
    image: pingcap/tikv:${DBTOOL_IT_TIDB_VERSION:-v8.5.6}
    container_name: ${DBTOOL_IT_PROJECT:-dbtool-it}-tidb-secure-tikv-1
    command:
      [
        "--config=/tidb-secure/tikv.toml",
        "--addr=0.0.0.0:20160",
        "--advertise-addr=tidb-secure-tikv-1:20160",
        "--status-addr=0.0.0.0:20180",
        "--pd-endpoints=https://tidb-secure-pd-1:2379,https://tidb-secure-pd-2:2379,https://tidb-secure-pd-3:2379",
        "--data-dir=/tmp/tikv",
      ]
    depends_on:
      - tidb-secure-pd-1
      - tidb-secure-pd-2
      - tidb-secure-pd-3
    volumes:
      - "${DBTOOL_IT_TIDB_SECURE_DIR:-.tmp/dbtool-it-tidb-secure}:/tidb-secure:ro"
    ulimits:
      nofile:
        soft: ${DBTOOL_IT_TIDB_SECURE_TIKV_NOFILE_SOFT:-200000}
        hard: ${DBTOOL_IT_TIDB_SECURE_TIKV_NOFILE_HARD:-200000}
    cpus: ${DBTOOL_IT_TIDB_SECURE_TIKV_CPUS:-0.50}
    mem_limit: ${DBTOOL_IT_TIDB_SECURE_TIKV_MEMORY:-1g}

  tidb-secure-tikv-2:
    profiles: ["tidb-secure"]
    image: pingcap/tikv:${DBTOOL_IT_TIDB_VERSION:-v8.5.6}
    container_name: ${DBTOOL_IT_PROJECT:-dbtool-it}-tidb-secure-tikv-2
    command:
      [
        "--config=/tidb-secure/tikv.toml",
        "--addr=0.0.0.0:20160",
        "--advertise-addr=tidb-secure-tikv-2:20160",
        "--status-addr=0.0.0.0:20180",
        "--pd-endpoints=https://tidb-secure-pd-1:2379,https://tidb-secure-pd-2:2379,https://tidb-secure-pd-3:2379",
        "--data-dir=/tmp/tikv",
      ]
    depends_on:
      - tidb-secure-pd-1
      - tidb-secure-pd-2
      - tidb-secure-pd-3
    volumes:
      - "${DBTOOL_IT_TIDB_SECURE_DIR:-.tmp/dbtool-it-tidb-secure}:/tidb-secure:ro"
    ulimits:
      nofile:
        soft: ${DBTOOL_IT_TIDB_SECURE_TIKV_NOFILE_SOFT:-200000}
        hard: ${DBTOOL_IT_TIDB_SECURE_TIKV_NOFILE_HARD:-200000}
    cpus: ${DBTOOL_IT_TIDB_SECURE_TIKV_CPUS:-0.50}
    mem_limit: ${DBTOOL_IT_TIDB_SECURE_TIKV_MEMORY:-1g}

  tidb-secure-1:
    profiles: ["tidb-secure"]
    image: pingcap/tidb:${DBTOOL_IT_TIDB_VERSION:-v8.5.6}
    container_name: ${DBTOOL_IT_PROJECT:-dbtool-it}-tidb-secure-1
    command:
      [
        "--config=/tidb-secure/tidb.toml",
        "--store=tikv",
        "--path=tidb-secure-pd-1:2379,tidb-secure-pd-2:2379,tidb-secure-pd-3:2379",
        "--host=0.0.0.0",
        "--advertise-address=tidb-secure-1",
        "-P=4000",
        "--status=10080",
      ]
    depends_on:
      - tidb-secure-pd-1
      - tidb-secure-pd-2
      - tidb-secure-pd-3
      - tidb-secure-tikv-1
      - tidb-secure-tikv-2
    ports:
      - "${DBTOOL_IT_TIDB_SECURE_PORT_1:-14100}:4000"
      - "${DBTOOL_IT_TIDB_SECURE_STATUS_PORT_1:-11100}:10080"
    volumes:
      - "${DBTOOL_IT_TIDB_SECURE_DIR:-.tmp/dbtool-it-tidb-secure}:/tidb-secure:ro"
    cpus: ${DBTOOL_IT_TIDB_SECURE_CPUS:-0.50}
    mem_limit: ${DBTOOL_IT_TIDB_SECURE_MEMORY:-512m}

  tidb-secure-2:
    profiles: ["tidb-secure"]
    image: pingcap/tidb:${DBTOOL_IT_TIDB_VERSION:-v8.5.6}
    container_name: ${DBTOOL_IT_PROJECT:-dbtool-it}-tidb-secure-2
    command:
      [
        "--config=/tidb-secure/tidb.toml",
        "--store=tikv",
        "--path=tidb-secure-pd-1:2379,tidb-secure-pd-2:2379,tidb-secure-pd-3:2379",
        "--host=0.0.0.0",
        "--advertise-address=tidb-secure-2",
        "-P=4000",
        "--status=10080",
      ]
    depends_on:
      - tidb-secure-pd-1
      - tidb-secure-pd-2
      - tidb-secure-pd-3
      - tidb-secure-tikv-1
      - tidb-secure-tikv-2
    ports:
      - "${DBTOOL_IT_TIDB_SECURE_PORT_2:-14101}:4000"
      - "${DBTOOL_IT_TIDB_SECURE_STATUS_PORT_2:-11101}:10080"
    volumes:
      - "${DBTOOL_IT_TIDB_SECURE_DIR:-.tmp/dbtool-it-tidb-secure}:/tidb-secure:ro"
    cpus: ${DBTOOL_IT_TIDB_SECURE_CPUS:-0.50}
    mem_limit: ${DBTOOL_IT_TIDB_SECURE_MEMORY:-512m}

  tidb-secure-tiproxy:
    profiles: ["tidb-tiproxy"]
    image: pingcap/tiproxy:${DBTOOL_IT_TIDB_TIPROXY_VERSION:-v1.3.2}
    container_name: ${DBTOOL_IT_PROJECT:-dbtool-it}-tidb-secure-tiproxy
    entrypoint: ["/bin/tiproxy"]
    command: ["--config=/tidb-secure/tiproxy.toml"]
    depends_on:
      - tidb-secure-pd-1
      - tidb-secure-pd-2
      - tidb-secure-pd-3
      - tidb-secure-tikv-1
      - tidb-secure-tikv-2
      - tidb-secure-1
      - tidb-secure-2
    ports:
      - "${DBTOOL_IT_TIDB_TIPROXY_PORT:-14200}:6000"
      - "${DBTOOL_IT_TIDB_TIPROXY_STATUS_PORT:-11200}:3080"
    volumes:
      - "${DBTOOL_IT_TIDB_SECURE_DIR:-.tmp/dbtool-it-tidb-secure}:/tidb-secure:ro"
    cpus: ${DBTOOL_IT_TIDB_TIPROXY_CPUS:-0.25}
    mem_limit: ${DBTOOL_IT_TIDB_TIPROXY_MEMORY:-256m}

  redis:
    image: redis:7-alpine
    container_name: ${DBTOOL_IT_PROJECT:-dbtool-it}-redis
    command:
      [
        "redis-server",
        "--appendonly",
        "no",
        "--save",
        "",
        "--maxmemory",
        "${DBTOOL_IT_REDIS_MAXMEMORY:-128mb}",
        "--maxmemory-policy",
        "allkeys-lru",
      ]
    ports:
      - "${DBTOOL_IT_REDIS_PORT:-16379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 30
    cpus: ${DBTOOL_IT_REDIS_CPUS:-0.25}
    mem_limit: ${DBTOOL_IT_REDIS_MEMORY:-256m}

  valkey:
    profiles: ["compat"]
    image: valkey/valkey:8-alpine
    container_name: ${DBTOOL_IT_PROJECT:-dbtool-it}-valkey
    command:
      [
        "valkey-server",
        "--appendonly",
        "no",
        "--save",
        "",
        "--maxmemory",
        "${DBTOOL_IT_VALKEY_MAXMEMORY:-128mb}",
        "--maxmemory-policy",
        "allkeys-lru",
      ]
    ports:
      - "${DBTOOL_IT_VALKEY_PORT:-26379}:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 30
    cpus: ${DBTOOL_IT_VALKEY_CPUS:-0.25}
    mem_limit: ${DBTOOL_IT_VALKEY_MEMORY:-256m}

  keydb:
    profiles: ["compat-extra"]
    image: eqalpha/keydb:alpine
    platform: ${DBTOOL_IT_KEYDB_PLATFORM:-linux/amd64}
    container_name: ${DBTOOL_IT_PROJECT:-dbtool-it}-keydb
    command:
      [
        "keydb-server",
        "--appendonly",
        "no",
        "--save",
        "",
        "--maxmemory",
        "${DBTOOL_IT_KEYDB_MAXMEMORY:-128mb}",
        "--maxmemory-policy",
        "allkeys-lru",
      ]
    ports:
      - "${DBTOOL_IT_KEYDB_PORT:-26380}:6379"
    healthcheck:
      test: ["CMD", "keydb-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 30
    cpus: ${DBTOOL_IT_KEYDB_CPUS:-0.25}
    mem_limit: ${DBTOOL_IT_KEYDB_MEMORY:-256m}

  dragonfly:
    profiles: ["compat-extra"]
    image: docker.dragonflydb.io/dragonflydb/dragonfly:latest
    container_name: ${DBTOOL_IT_PROJECT:-dbtool-it}-dragonfly
    command:
      [
        "--maxmemory=${DBTOOL_IT_DRAGONFLY_MAXMEMORY:-256mb}",
      ]
    ports:
      - "${DBTOOL_IT_DRAGONFLY_PORT:-26381}:6379"
    cpus: ${DBTOOL_IT_DRAGONFLY_CPUS:-0.25}
    mem_limit: ${DBTOOL_IT_DRAGONFLY_MEMORY:-384m}

  mongo:
    image: mongo:7
    container_name: ${DBTOOL_IT_PROJECT:-dbtool-it}-mongo
    command: ["mongod", "--bind_ip", "0.0.0.0"]
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${DBTOOL_IT_MONGO_USER:-dbtool}
      MONGO_INITDB_ROOT_PASSWORD: ${DBTOOL_IT_MONGO_PASSWORD:-dbtool}
      MONGO_INITDB_DATABASE: ${DBTOOL_IT_MONGO_DB:-dbtool_it_mongo}
    ports:
      - "${DBTOOL_IT_MONGO_PORT:-17017}:27017"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --quiet --username ${DBTOOL_IT_MONGO_USER:-dbtool} --password ${DBTOOL_IT_MONGO_PASSWORD:-dbtool} --authenticationDatabase admin --eval 'db.adminCommand({ ping: 1 }).ok' | grep 1",
        ]
      interval: 3s
      timeout: 5s
      retries: 40
    cpus: ${DBTOOL_IT_MONGO_CPUS:-0.50}
    mem_limit: ${DBTOOL_IT_MONGO_MEMORY:-512m}

  postgres-fixture:
    profiles: ["fixture-images"]
    image: ${DBTOOL_IT_POSTGRES_FIXTURE_IMAGE:-dbtool-fixture-postgres:local}
    build:
      context: .
      dockerfile: docker/fixtures/postgres/Dockerfile
    container_name: ${DBTOOL_IT_PROJECT:-dbtool-it}-postgres-fixture
    environment:
      POSTGRES_DB: ${DBTOOL_IT_POSTGRES_FIXTURE_DB:-dbtool_it_pg_fixture}
      POSTGRES_USER: ${DBTOOL_IT_POSTGRES_FIXTURE_USER:-dbtool}
      POSTGRES_PASSWORD: ${DBTOOL_IT_POSTGRES_FIXTURE_PASSWORD:-dbtool}
    ports:
      - "${DBTOOL_IT_POSTGRES_FIXTURE_PORT:-16432}:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DBTOOL_IT_POSTGRES_FIXTURE_USER:-dbtool} -d ${DBTOOL_IT_POSTGRES_FIXTURE_DB:-dbtool_it_pg_fixture}",
        ]
      interval: 2s
      timeout: 3s
      retries: 30
    cpus: ${DBTOOL_IT_POSTGRES_FIXTURE_CPUS:-0.50}
    mem_limit: ${DBTOOL_IT_POSTGRES_FIXTURE_MEMORY:-512m}

  mysql-fixture:
    profiles: ["fixture-images"]
    image: ${DBTOOL_IT_MYSQL_FIXTURE_IMAGE:-dbtool-fixture-mysql:local}
    build:
      context: .
      dockerfile: docker/fixtures/mysql/Dockerfile
    container_name: ${DBTOOL_IT_PROJECT:-dbtool-it}-mysql-fixture
    environment:
      MYSQL_DATABASE: ${DBTOOL_IT_MYSQL_FIXTURE_DB:-dbtool_it_mysql_fixture}
      MYSQL_USER: ${DBTOOL_IT_MYSQL_FIXTURE_USER:-dbtool}
      MYSQL_PASSWORD: ${DBTOOL_IT_MYSQL_FIXTURE_PASSWORD:-dbtool}
      MYSQL_ROOT_PASSWORD: ${DBTOOL_IT_MYSQL_FIXTURE_ROOT_PASSWORD:-dbtool_root}
    command:
      [
        "mysqld",
        "--mysql-native-password=ON",
        "--max-connections=40",
        "--performance-schema=OFF",
      ]
    ports:
      - "${DBTOOL_IT_MYSQL_FIXTURE_PORT:-14306}:3306"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -u${DBTOOL_IT_MYSQL_FIXTURE_USER:-dbtool} -p${DBTOOL_IT_MYSQL_FIXTURE_PASSWORD:-dbtool} --silent",
        ]
      interval: 3s
      timeout: 5s
      retries: 40
    cpus: ${DBTOOL_IT_MYSQL_FIXTURE_CPUS:-0.75}
    mem_limit: ${DBTOOL_IT_MYSQL_FIXTURE_MEMORY:-768m}

  redis-fixture:
    profiles: ["fixture-images"]
    image: ${DBTOOL_IT_REDIS_FIXTURE_IMAGE:-dbtool-fixture-redis:local}
    build:
      context: .
      dockerfile: docker/fixtures/redis/Dockerfile
    container_name: ${DBTOOL_IT_PROJECT:-dbtool-it}-redis-fixture
    command:
      [
        "redis-server",
        "--appendonly",
        "no",
        "--save",
        "",
        "--maxmemory",
        "${DBTOOL_IT_REDIS_FIXTURE_MAXMEMORY:-128mb}",
        "--maxmemory-policy",
        "allkeys-lru",
      ]
    ports:
      - "${DBTOOL_IT_REDIS_FIXTURE_PORT:-17379}:6379"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "test \"$(redis-cli get dbtool:fixture:user:1)\" = alice",
        ]
      interval: 2s
      timeout: 3s
      retries: 30
    cpus: ${DBTOOL_IT_REDIS_FIXTURE_CPUS:-0.25}
    mem_limit: ${DBTOOL_IT_REDIS_FIXTURE_MEMORY:-256m}

  mongo-fixture:
    profiles: ["fixture-images"]
    image: ${DBTOOL_IT_MONGO_FIXTURE_IMAGE:-dbtool-fixture-mongo:local}
    build:
      context: .
      dockerfile: docker/fixtures/mongo/Dockerfile
    container_name: ${DBTOOL_IT_PROJECT:-dbtool-it}-mongo-fixture
    command: ["mongod", "--bind_ip", "0.0.0.0"]
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${DBTOOL_IT_MONGO_FIXTURE_USER:-dbtool}
      MONGO_INITDB_ROOT_PASSWORD: ${DBTOOL_IT_MONGO_FIXTURE_PASSWORD:-dbtool}
      MONGO_INITDB_DATABASE: ${DBTOOL_IT_MONGO_FIXTURE_DB:-dbtool_it_mongo_fixture}
    ports:
      - "${DBTOOL_IT_MONGO_FIXTURE_PORT:-18017}:27017"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --quiet --username ${DBTOOL_IT_MONGO_FIXTURE_USER:-dbtool} --password ${DBTOOL_IT_MONGO_FIXTURE_PASSWORD:-dbtool} --authenticationDatabase admin --eval 'db.getSiblingDB(\"${DBTOOL_IT_MONGO_FIXTURE_DB:-dbtool_it_mongo_fixture}\").dbtool_fixture_people.countDocuments({kind:\"dbtool-fixture\"})' | grep 3",
        ]
      interval: 3s
      timeout: 5s
      retries: 40
    cpus: ${DBTOOL_IT_MONGO_FIXTURE_CPUS:-0.50}
    mem_limit: ${DBTOOL_IT_MONGO_FIXTURE_MEMORY:-512m}

  opensearch:
    profiles: ["observability"]
    image: opensearchproject/opensearch:${DBTOOL_IT_OPENSEARCH_VERSION:-2.17.1}
    container_name: ${DBTOOL_IT_PROJECT:-dbtool-it}-opensearch
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: "true"
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: ${DBTOOL_IT_OPENSEARCH_ADMIN_PASSWORD:-DbtoolAdmin1!}
      OPENSEARCH_JAVA_OPTS: ${DBTOOL_IT_OPENSEARCH_JAVA_OPTS:--Xms256m -Xmx256m}
    ports:
      - "${DBTOOL_IT_OPENSEARCH_PORT:-19200}:9200"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://127.0.0.1:9200/_cluster/health >/dev/null || exit 1",
        ]
      interval: 5s
      timeout: 10s
      retries: 60
    cpus: ${DBTOOL_IT_OPENSEARCH_CPUS:-1.00}
    mem_limit: ${DBTOOL_IT_OPENSEARCH_MEMORY:-1g}

  opensearch-tls:
    profiles: ["observability"]
    image: ${DBTOOL_IT_SEARCH_TLS_IMAGE:-dbtool-search-tls:local}
    build:
      context: .
      dockerfile: docker/search-tls/Dockerfile
      args:
        PYTHON_VERSION: ${DBTOOL_IT_SEARCH_TLS_PYTHON_VERSION:-3.12-alpine}
    container_name: ${DBTOOL_IT_PROJECT:-dbtool-it}-opensearch-tls
    command:
      [
        "--host",
        "0.0.0.0",
        "--port",
        "9200",
        "--cert",
        "/search-tls/certs/server.pem",
        "--key",
        "/search-tls/certs/server-key.pem",
        "--seed",
        "/search-tls/seed.ndjson",
      ]
    volumes:
      - ${DBTOOL_IT_SEARCH_TLS_DIR:-.tmp/dbtool-it-search-tls}/certs:/search-tls/certs:ro
    ports:
      - "${DBTOOL_IT_OPENSEARCH_TLS_PORT:-19201}:9200"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import ssl, urllib.request; urllib.request.urlopen('https://127.0.0.1:9200/_cluster/health', context=ssl._create_unverified_context(), timeout=2).read()\"",
        ]
      interval: 3s
      timeout: 5s
      retries: 40
    cpus: ${DBTOOL_IT_SEARCH_TLS_CPUS:-0.25}
    mem_limit: ${DBTOOL_IT_SEARCH_TLS_MEMORY:-128m}

  opensearch-security:
    profiles: ["opensearch-security"]
    image: opensearchproject/opensearch:${DBTOOL_IT_OPENSEARCH_SECURITY_VERSION:-2.17.1}
    container_name: ${DBTOOL_IT_PROJECT:-dbtool-it}-opensearch-security
    environment:
      discovery.type: single-node
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: ${DBTOOL_IT_OPENSEARCH_SECURITY_ADMIN_PASSWORD:-S7!k9Vx2Qp4Lm8Nz}
      OPENSEARCH_JAVA_OPTS: ${DBTOOL_IT_OPENSEARCH_SECURITY_JAVA_OPTS:--Xms512m -Xmx512m}
      plugins.security.allow_default_init_securityindex: "true"
      plugins.security.nodes_dn: '["CN=dbtool-it-opensearch-security"]'
      plugins.security.ssl.http.enabled: "true"
      plugins.security.ssl.http.pemcert_filepath: dbtool-certs/node.pem
      plugins.security.ssl.http.pemkey_filepath: dbtool-certs/node-key.pem
      plugins.security.ssl.http.pemtrustedcas_filepath: dbtool-certs/ca.pem
      plugins.security.ssl.transport.pemcert_filepath: dbtool-certs/node.pem
      plugins.security.ssl.transport.pemkey_filepath: dbtool-certs/node-key.pem
      plugins.security.ssl.transport.pemtrustedcas_filepath: dbtool-certs/ca.pem
      plugins.security.ssl.transport.enforce_hostname_verification: "false"
    volumes:
      - ${DBTOOL_IT_OPENSEARCH_SECURITY_DIR:-.tmp/dbtool-it-opensearch-security}/certs:/usr/share/opensearch/config/dbtool-certs:ro
    ports:
      - "127.0.0.1:${DBTOOL_IT_OPENSEARCH_SECURITY_PORT:-19203}:9200"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsSk -u admin:${DBTOOL_IT_OPENSEARCH_SECURITY_ADMIN_PASSWORD:-S7!k9Vx2Qp4Lm8Nz} https://127.0.0.1:9200/_cluster/health >/dev/null || exit 1",
        ]
      interval: 5s
      timeout: 10s
      retries: 80
    cpus: ${DBTOOL_IT_OPENSEARCH_SECURITY_CPUS:-1.00}
    mem_limit: ${DBTOOL_IT_OPENSEARCH_SECURITY_MEMORY:-1536m}

  prometheus:
    profiles: ["observability"]
    image: prom/prometheus:${DBTOOL_IT_PROMETHEUS_VERSION:-v2.55.1}
    container_name: ${DBTOOL_IT_PROJECT:-dbtool-it}-prometheus
    command:
      [
        "--config.file=/etc/prometheus/prometheus.yml",
        "--web.enable-remote-write-receiver",
        "--web.enable-admin-api",
        "--storage.tsdb.retention.time=1h",
        "--storage.tsdb.path=/prometheus",
      ]
    ports:
      - "${DBTOOL_IT_PROMETHEUS_PORT:-19090}:9090"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9090/-/ready >/dev/null || exit 1"]
      interval: 3s
      timeout: 5s
      retries: 40
    cpus: ${DBTOOL_IT_PROMETHEUS_CPUS:-0.25}
    mem_limit: ${DBTOOL_IT_PROMETHEUS_MEMORY:-256m}

  elasticsearch:
    profiles: ["elasticsearch"]
    image: docker.elastic.co/elasticsearch/elasticsearch:${DBTOOL_IT_ELASTICSEARCH_VERSION:-8.15.5}
    container_name: ${DBTOOL_IT_PROJECT:-dbtool-it}-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      xpack.security.http.ssl.enabled: "false"
      ES_JAVA_OPTS: ${DBTOOL_IT_ELASTICSEARCH_JAVA_OPTS:--Xms512m -Xmx512m}
    ports:
      - "${DBTOOL_IT_ELASTICSEARCH_PORT:-19202}:9200"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://127.0.0.1:9200/_cluster/health >/dev/null || exit 1",
        ]
      interval: 5s
      timeout: 10s
      retries: 80
    cpus: ${DBTOOL_IT_ELASTICSEARCH_CPUS:-1.00}
    mem_limit: ${DBTOOL_IT_ELASTICSEARCH_MEMORY:-1536m}

  kafka:
    profiles: ["messaging"]
    image: redpandadata/redpanda:v24.3.6
    container_name: ${DBTOOL_IT_PROJECT:-dbtool-it}-kafka
    command:
      [
        "redpanda",
        "start",
        "--overprovisioned",
        "--smp",
        "1",
        "--memory",
        "${DBTOOL_IT_KAFKA_BROKER_MEMORY:-512M}",
        "--reserve-memory",
        "0M",
        "--node-id",
        "0",
        "--check=false",
        "--kafka-addr",
        "PLAINTEXT://0.0.0.0:9092",
        "--advertise-kafka-addr",
        "PLAINTEXT://127.0.0.1:${DBTOOL_IT_KAFKA_PORT:-19092}",
      ]
    ports:
      - "${DBTOOL_IT_KAFKA_PORT:-19092}:9092"
      - "${DBTOOL_IT_KAFKA_ADMIN_PORT:-19644}:9644"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health --exit-when-healthy --watch=false"]
      interval: 5s
      timeout: 10s
      retries: 40
    cpus: ${DBTOOL_IT_KAFKA_CPUS:-0.75}
    mem_limit: ${DBTOOL_IT_KAFKA_MEMORY:-1g}

  rabbitmq:
    profiles: ["messaging"]
    image: rabbitmq:3.13-management-alpine
    container_name: ${DBTOOL_IT_PROJECT:-dbtool-it}-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${DBTOOL_IT_AMQP_USER:-dbtool}
      RABBITMQ_DEFAULT_PASS: ${DBTOOL_IT_AMQP_PASSWORD:-dbtool}
      RABBITMQ_DEFAULT_VHOST: ${DBTOOL_IT_AMQP_VHOST:-dbtool_it}
    ports:
      - "${DBTOOL_IT_AMQP_PORT:-15672}:5672"
      - "${DBTOOL_IT_AMQP_MANAGEMENT_PORT:-15673}:15672"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "rabbitmq-diagnostics -q ping && rabbitmq-diagnostics -q check_port_connectivity",
        ]
      interval: 5s
      timeout: 10s
      retries: 40
    cpus: ${DBTOOL_IT_AMQP_CPUS:-0.50}
    mem_limit: ${DBTOOL_IT_AMQP_MEMORY:-512m}

  nats:
    profiles: ["messaging"]
    image: nats:2.10-alpine
    container_name: ${DBTOOL_IT_PROJECT:-dbtool-it}-nats
    command: ["-js", "-m", "8222"]
    ports:
      - "${DBTOOL_IT_NATS_PORT:-14222}:4222"
      - "${DBTOOL_IT_NATS_MONITOR_PORT:-18222}:8222"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8222/healthz || exit 1"]
      interval: 3s
      timeout: 5s
      retries: 40
    cpus: ${DBTOOL_IT_NATS_CPUS:-0.25}
    mem_limit: ${DBTOOL_IT_NATS_MEMORY:-256m}

  rabbitmq-tls:
    profiles: ["messaging-tls"]
    image: rabbitmq:3.13-management-alpine
    container_name: ${DBTOOL_IT_PROJECT:-dbtool-it}-rabbitmq-tls
    environment:
      RABBITMQ_DEFAULT_USER: ${DBTOOL_IT_AMQP_USER:-dbtool}
      RABBITMQ_DEFAULT_PASS: ${DBTOOL_IT_AMQP_PASSWORD:-dbtool}
      RABBITMQ_DEFAULT_VHOST: ${DBTOOL_IT_AMQP_VHOST:-dbtool_it}
    volumes:
      - ${DBTOOL_IT_MQ_TLS_DIR:-.tmp/dbtool-it-mq-tls}/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ${DBTOOL_IT_MQ_TLS_DIR:-.tmp/dbtool-it-mq-tls}/certs:/etc/rabbitmq/certs:ro
    ports:
      - "${DBTOOL_IT_AMQPS_PORT:-25671}:5671"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "rabbitmq-diagnostics -q ping && rabbitmq-diagnostics -q check_running",
        ]
      interval: 5s
      timeout: 10s
      retries: 40
    cpus: ${DBTOOL_IT_AMQP_CPUS:-0.50}
    mem_limit: ${DBTOOL_IT_AMQP_MEMORY:-512m}

  nats-tls:
    profiles: ["messaging-tls"]
    image: nats:2.10-alpine
    container_name: ${DBTOOL_IT_PROJECT:-dbtool-it}-nats-tls
    command: ["-c", "/etc/nats/nats.conf"]
    volumes:
      - ${DBTOOL_IT_MQ_TLS_DIR:-.tmp/dbtool-it-mq-tls}/nats.conf:/etc/nats/nats.conf:ro
      - ${DBTOOL_IT_MQ_TLS_DIR:-.tmp/dbtool-it-mq-tls}/certs:/etc/nats/certs:ro
    ports:
      - "${DBTOOL_IT_NATS_TLS_PORT:-24222}:4222"
      - "${DBTOOL_IT_NATS_TLS_MONITOR_PORT:-28222}:8222"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8222/healthz || exit 1"]
      interval: 3s
      timeout: 5s
      retries: 40
    cpus: ${DBTOOL_IT_NATS_CPUS:-0.25}
    mem_limit: ${DBTOOL_IT_NATS_MEMORY:-256m}

  db2:
    profiles: ["db2"]
    image: icr.io/db2_community/db2:${DBTOOL_IT_DB2_VERSION:-latest}
    container_name: ${DBTOOL_IT_PROJECT:-dbtool-it}-db2
    hostname: dbtool-it-db2
    privileged: true
    environment:
      LICENSE: accept
      DB2INSTANCE: ${DBTOOL_IT_DB2_INSTANCE:-db2inst1}
      DB2INST1_PASSWORD: ${DBTOOL_IT_DB2_PASSWORD:-Dbtool_DB2_123!}
      DBNAME: ${DBTOOL_IT_DB2_DB:-DBTOOLIT}
      UPDATEAVAIL: "NO"
      AUTOCONFIG: "false"
      HADR_ENABLED: "false"
      ENABLE_ORACLE_COMPATIBILITY: "false"
    ports:
      - "${DBTOOL_IT_DB2_PORT:-50000}:50000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "su - db2inst1 -c 'db2 connect to ${DBTOOL_IT_DB2_DB:-DBTOOLIT}' > /dev/null 2>&1 && echo OK",
        ]
      interval: 15s
      timeout: 30s
      retries: 60
      start_period: 120s
    cpus: ${DBTOOL_IT_DB2_CPUS:-2.00}
    mem_limit: ${DBTOOL_IT_DB2_MEMORY:-4g}
